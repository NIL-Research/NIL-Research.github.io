{{ with .items }}
<section class="section">
  <div class="section-container">
    <h2 class="section-title">{{ $.title }}</h2>
    <div class="section-intro">
      <ul>
        {{ range . }}
          <li>
            {{ if .url }}<a href="{{ .url | relURL }}">{{ .title | default "待更新" }}</a>{{ else }}{{ .title | default "待更新" }}{{ end }}
          </li>
        {{ end }}
      </ul>
    </div>
  </div>
</section>
{{ end }}
