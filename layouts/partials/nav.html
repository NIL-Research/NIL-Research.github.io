<nav id="mainNav">
<ul>
    {{- range .Site.Menus.main -}}
    {{- if .HasChildren -}}
        <li class="has-submenu">
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        <ul class="submenu">
            {{- range .Children -}}
            <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
            {{- end -}}
        </ul>
        </li>
    {{- else -}}
        <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
    {{- end -}}
    {{- end -}}
</ul>
</nav>
