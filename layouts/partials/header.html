<header class="header">
    <div class="logo-left">
        <a href="{{ "/" | relURL }}">
            <img src="{{ "/images/nil-logo-trans.png" | relURL }}" alt="NIL - Neurocognitive Image Lab logo">
        </a>
    </div>

    <button class="menu-toggle" type="button" aria-label="Open navigation" aria-controls="mainNav" aria-expanded="false" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="menu-overlay" onclick="toggleMenu()"></div>

    {{ partial "nav.html" . }}

    <div class="language-switcher">
        {{ if eq .Site.Language.Lang "en" }}
        <a href="{{ "/" | relURL }}" lang="zh-Hans">中文</a>
        {{ else }}
        <a href="{{ "/en/" | relURL }}" lang="en">EN</a>
        {{ end }}
    </div>

    <div class="logo-right">
        <a href="{{ "/" | relURL }}">
            <img src="{{ "/images/SISU-logo-trans.png" | relURL }}" alt="Shanghai International Studies University logo">
        </a>
    </div>
</header>
